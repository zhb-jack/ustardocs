  # # ==================== Grafana 鍙鍖?====================
  # grafana:
  #   image: grafana/grafana:10.0.0
  #   container_name: go-services-grafana
  #   ports:
  #     - "3002:3000"  # 澶栭儴绔彛鏀逛负3002锛屽唴閮ㄧ鍙ｄ繚鎸?000
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #     GF_INSTALL_PLUGINS: grafana-piechart-panel
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #     - ./config/grafana:/etc/grafana/provisioning
  #   networks:
  #     - digital-custody-network
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # ==================== Kong API 缃戝叧 ====================
  kong-bootstrap:
    image: kong:3.4
    container_name: kong-bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    networks:
      - digital-custody-network
    restart: "no"

  kong:
    image: kong:3.4
    container_name: kong-gateway
    depends_on:
      kong-bootstrap:
        condition: service_completed_successfully
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_PLUGINS: bundled,prometheus
      KONG_PLUGINSERVER_NAMES: prometheus
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./config/kong:/opt/kong/config
      - ./logs/kong:/opt/kong/logs
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

