version: '3.8'

services:
  # ==================== PostgreSQL 鏁版嵁搴撴湇鍔?====================
  kong-database:
    image: postgres:15-alpine
    container_name: kong-postgres
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong123
    volumes:
      - kong_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-services-database:
    image: postgres:15-alpine
    container_name: go-services-postgres
    environment:
      POSTGRES_DB: nh_wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缂撳瓨鏈嶅姟 ====================
  redis:
    image: redis:7-alpine
    container_name: go-services-redis  
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== NATS JetStream 娑堟伅闃熷垪 ====================
  nats:
    image: nats:2.10-alpine
    container_name: go-services-nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: 
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    volumes:
      - nats_data:/data
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Jaeger 閾捐矾杩借釜 ====================
  jaeger:
    image: jaegertracing/all-in-one:1.48
    container_name: go-services-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - digital-custody-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 5

